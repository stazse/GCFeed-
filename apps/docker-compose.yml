version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: gcfeed-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 14335992
      # 注意：这里不设置 MYSQL_DATABASE，因为我们的 Go 代码会自动创建
      # 如果你想让 Docker 初始化时就创建好库，取消下面这行注释：
      # MYSQL_DATABASE: gcfeed
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: gcfeed-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
